services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: idempotency_dev
    volumes:
      - db_data:/var/lib/postgresql/data
  redis:
    image: redis:7
  web:
    build: .
    command: bash -lc "bundle exec rails db:create db:migrate && bundle exec puma -C config/puma.rb"
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://postgres:password@db:5432/idempotency_dev
      REDIS_URL: redis://redis:6379/0
      RAILS_ENV: development
    depends_on:
      - db
      - redis
volumes:
  db_data: {}
