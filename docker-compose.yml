version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: idempotency_dev
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
  redis:
    image: redis:7
    ports:
      - "6379:6379"
  web:
    build: ./service
    command: bash -lc "bundle exec rails db:create db:migrate && bundle exec puma -C config/puma.rb"
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://postgres:password@db:5432/idempotency_dev
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis
volumes:
  db_data: {}
