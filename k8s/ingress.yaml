apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: idempotency-ingress
  annotations:
    kubernetes.io/ingress.class: "gce"
    kubernetes.io/ingress.global-static-ip-name: "" # optional
spec:
  rules:
    - host: idempotency.example.com  # replace with real host
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: idempotency-service
                port:
                  number: 80
