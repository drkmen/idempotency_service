apiVersion: apps/v1
kind: Deployment
metadata:
  name: idempotency-service
  labels:
    app: idempotency-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: idempotency-service
  template:
    metadata:
      labels:
        app: idempotency-service
    spec:
      serviceAccountName: idempotency-service-sa
      containers:
        - name: app
          image: gcr.io/PROJECT_ID/idempotency-service:COMMIT_SHA   # replace with actual image location
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          env:
            - name: RAILS_ENV
              value: "production"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: idempotency-secrets
                  key: database_url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: idempotency-secrets
                  key: redis_url
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
          readinessProbe:
            httpGet:
              path: /ready
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
