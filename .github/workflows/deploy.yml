name: CI/CD - build & deploy

on:
  push:
    branches: ["main"]

env:
  IMAGE: gcr.io/${{ secrets.GCP_PROJECT }}/idempotency-service

jobs:
  build-and-push:
    name: Build and push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Configure Google Cloud credentials (Workload Identity Federation)
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
  deploy-staging:
    name: Deploy to staging
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v3
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER }}
          location: ${{ secrets.GKE_ZONE }}
          project_id: ${{ secrets.GCP_PROJECT }}
      - name: Deploy manifests
        run: |
          kubectl apply -f k8s/
  deploy-prod:
    name: Deploy to production (manual approval)
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://idempotency.example.com
    steps:
      - name: Wait for approval
        run: echo "Deployment to production approved by environment reviewers."
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v3
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER }}
          location: ${{ secrets.GKE_ZONE }}
          project_id: ${{ secrets.GCP_PROJECT }}
      - name: Deploy manifests to production
        run: |
          kubectl apply -f k8s/

# Notes:
# - Configure the following secrets in the repository: GCP_PROJECT, GCP_SERVICE_ACCOUNT, WORKLOAD_IDENTITY_PROVIDER, GKE_CLUSTER, GKE_ZONE
# - Protect the `production` environment in GitHub and require manual approvals and reviewers for safety.
